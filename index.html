<!DOCTYPE html>
<html>
<head>
  <title>Happy Birthday Palak 🎂</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      font-family: Arial, sans-serif;
      overflow-x: hidden;
      background: linear-gradient(to right, #ff758c, #ff7eb3);
      color: white;
    }

    .slide {
      display: none;
      width: 100%;
      height: 100vh;
      text-align: center;
      position: relative;
    }

    .slide img {
      max-width: 90%;
      max-height: 70vh;
      margin-top: 50px;
      border-radius: 20px;
      box-shadow: 0px 5px 20px rgba(0,0,0,0.4);
      transition: transform 0.6s ease;
    }

    .slide img:hover { transform: scale(1.05); }

    button {
      position: absolute;
      bottom: 50px;
      left: 50%;
      transform: translateX(-50%);
      padding: 15px 30px;
      border: none;
      border-radius: 25px;
      background: white;
      color: #ff4b7d;
      font-weight: bold;
      cursor: pointer;
      font-size: 1.2rem;
    }

    button:hover { background: #ff4b7d; color: white; }

    /* Balloon style */
    .balloon {
      position: absolute;
      width: 50px;
      animation: float 8s linear infinite;
      z-index: 0;
    }

    @keyframes float {
      0% { transform: translateY(100vh) rotate(0deg); }
      100% { transform: translateY(-150px) rotate(360deg); }
    }

    /* Confetti */
    #confetti-canvas {
      position: fixed;
      top:0; left:0;
      width:100%;
      height:100%;
      pointer-events:none;
      z-index:999;
    }
  </style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>

<!-- Background Music -->
<audio id="bg-music" src="birthday.mp3" autoplay loop></audio>

<!-- Balloons -->
<img src="https://i.ibb.co/7yzDkJZ/balloon1.png" class="balloon" style="left:5%;">
<img src="https://i.ibb.co/6mrv2pH/balloon2.png" class="balloon" style="left:20%;">
<img src="https://i.ibb.co/qykfZ5D/balloon3.png" class="balloon" style="left:35%;">
<img src="https://i.ibb.co/k2N1tQF/balloon4.png" class="balloon" style="left:50%;">
<img src="https://i.ibb.co/tKjSxq1/balloon5.png" class="balloon" style="left:65%;">
<img src="https://i.ibb.co/7yzDkJZ/balloon6.png" class="balloon" style="left:80%;">
<img src="https://i.ibb.co/6mrv2pH/balloon7.png" class="balloon" style="left:90%;">

<!-- Slides -->
<div class="slide" style="display:block;">
  <h1>🎉 Happy Birthday Palak 🎉</h1>
  <p>Click Start to begin the surprise 💖</p>
  <button onclick="nextSlide()">Start</button>
</div>

<!-- 8 Slides -->
<div class="slide"><img src="1.jpg"><button onclick="nextSlide(); launchConfetti();">Next</button></div>
<div class="slide"><img src="2.jpg"><button onclick="nextSlide(); launchConfetti();">Next</button></div>
<div class="slide"><img src="3.jpg"><button onclick="nextSlide(); launchConfetti();">Next</button></div>
<div class="slide"><img src="4.jpg"><button onclick="nextSlide(); launchConfetti();">Next</button></div>
<div class="slide"><img src="5.jpg"><button onclick="nextSlide(); launchConfetti();">Next</button></div>
<div class="slide"><img src="6.jpg"><button onclick="nextSlide(); launchConfetti();">Next</button></div>
<div class="slide"><img src="7.jpg"><button onclick="nextSlide(); launchConfetti();">Next</button></div>
<div class="slide"><img src="8.jpg"><button onclick="nextSlide(); launchConfetti();">Next</button></div>

<!-- Last Game/Surprise Slide -->
<div class="slide">
  <h1>🎮 Game Time 🎮</h1>
  <p>Click below for a surprise gift!</p>
  <button onclick="alert('You are the Best Friend Ever 💖')">Click Me</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<script>
let current = 0;
let slides = document.getElementsByClassName("slide");

function nextSlide() {
  slides[current].style.display = "none";
  current++;
  if(current < slides.length){
    slides[current].style.display = "block";
  }
}

// Confetti effect
function launchConfetti() {
  let duration = 1*1000;
  let end = Date.now() + duration;
  (function frame(){
    confetti({ particleCount:5, angle:60, spread:55, origin:{x:0} });
    confetti({ particleCount:5, angle:120, spread:55, origin:{x:1} });
    if(Date.now() < end) requestAnimationFrame(frame);
  }());
}
</script>
</body>
</html>
