<!DOCTYPE html>
<html>
<head>
  <title>Happy Birthday Palak 🎂</title>
  <style>
    body {
      margin: 0;
      text-align: center;
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #ff758c, #ff7eb3);
      color: white;
    }
    .slide {
      display: none;
      padding: 20px;
    }
    img {
      width: 80%;
      max-height: 500px;
      border-radius: 20px;
      box-shadow: 0px 5px 20px rgba(0,0,0,0.4);
    }
    button {
      margin-top: 20px;
      padding: 10px 25px;
      border: none;
      border-radius: 20px;
      background: white;
      color: #ff4b7d;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="slide" style="display:block;">
  <h1>🎉 Welcome Palak 🎉</h1>
  <button onclick="nextSlide()">Start</button>
</div>

<div class="slide">
  <img src="slide1.jpg">
  <br><button onclick="nextSlide()">Next</button>
</div>

<div class="slide">
  <img src="slide2.jpg">
  <br><button onclick="nextSlide()">Next</button>
</div>

<div class="slide">
  <img src="slide3.jpg">
  <br><button onclick="nextSlide()">Next</button>
</div>

<div class="slide">
  <img src="slide4.jpg">
  <br><button onclick="nextSlide()">Next</button>
</div>

<div class="slide">
  <h1>🎮 Game Time 🎮</h1>
  <button onclick="alert('You are the Best Friend Ever 💖')">
    Click Me
  </button>
</div>

<script>
let current = 0;
let slides = document.getElementsByClassName("slide");

function nextSlide() {
  slides[current].style.display = "none";
  current++;
  if (current < slides.length) {
    slides[current].style.display = "block";
  }
}
</script>

</body>
</html>
